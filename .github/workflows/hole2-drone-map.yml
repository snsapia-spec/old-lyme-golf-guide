name: Hole 2 DroneDeploy map

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/hole2-drone-map.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-hole2-map:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install geospatial tools
        run: pip install rasterio matplotlib numpy scipy pillow
      - name: Download Hole 2 DroneDeploy folder
        run: |
          mkdir -p source/all outputs
          curl -L --
name: Hole 2 DroneDeploy map

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/hole2-drone-map.yml'

permissions:
  contents: read

jobs:
  build-hole2-map:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install geospatial tools
        run: pip install rasterio matplotlib numpy scipy pillow

      - name: Download Hole 2 DroneDeploy source folder
        env:
          DROPBOX_FOLDER_URL: 'https://